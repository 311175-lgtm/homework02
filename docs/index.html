<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>
  <div class="app-layout">
    <!-- 左側邊欄 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>待辦清單</h2>
        <span class="current-date-small" id="current-date-small"></span>
      </div>

      <div class="mini-calendar" id="mini-calendar"></div>

      <div class="sidebar-section">
        <h3>分類篩選</h3>
        <div class="category-filters">
          <button class="filter-btn active" data-category="">全部</button>
          <button class="filter-btn" data-category="學業類">學業</button>
          <button class="filter-btn" data-category="開發類">開發</button>
          <button class="filter-btn" data-category="生活類">生活</button>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>狀態篩選</h3>
        <select id="filter-status-sidebar" class="sidebar-select">
          <option value="">全部狀態</option>
          <option value="待處理">待處理</option>
          <option value="進行中">進行中</option>
          <option value="阻塞中">阻塞中</option>
          <option value="待驗證">待驗證</option>
          <option value="完成">完成</option>
        </select>
      </div>

      <div class="sidebar-section">
        <h3>快速操作</h3>
        <div class="quick-actions">
          <button type="button" id="fetch-quote" class="action-btn">Quote 新增</button>
          <button type="button" id="sync-load" class="action-btn">載入試算表</button>
          <button type="button" id="review-button" class="action-btn">週回顧</button>
          <button type="button" id="export-button" class="action-btn">匯出日曆</button>
        </div>
      </div>
    </aside>

    <!-- 右側主內容 -->
    <main class="main-content">
      <div class="top-bar">
        <div class="top-bar-left">
          <h1>To-Do List</h1>
          <div class="page-meta">今天是 <span id="current-date"></span></div>
        </div>
        <div class="top-bar-right">
          <input id="filter-keyword" class="search-input" placeholder="搜尋任務..." />
        </div>
      </div>

      <div class="form-card">
        <h2>新增任務</h2>
        <form id="todo-form" class="todo-form">
          <div class="form-row">
            <input id="todo-input" placeholder="任務名稱" required />
            <input id="todo-date" type="date" />
          </div>
          <div class="form-row">
            <select id="todo-category">
              <option value="">分類</option>
              <option value="學業類">學業類</option>
              <option value="開發類">開發類</option>
              <option value="生活類">生活類</option>
            </select>
            <select id="todo-status">
              <option value="待處理">待處理</option>
              <option value="進行中">進行中</option>
              <option value="阻塞中">阻塞中</option>
              <option value="待驗證">待驗證</option>
              <option value="完成">完成</option>
            </select>
            <select id="todo-priority">
              <option value="">優先級</option>
              <option value="緊急且重要">緊急且重要</option>
              <option value="重要不緊急">重要不緊急</option>
              <option value="緊急不重要">緊急不重要</option>
              <option value="不緊急也不重要">不緊急也不重要</option>
            </select>
          </div>
          <div class="form-row">
            <input id="todo-estimate" type="number" min="0" step="0.5" placeholder="預估時數" />
            <input id="todo-tags" placeholder="標籤" />
            <button type="submit" class="btn-primary">新增</button>
          </div>
        </form>
      </div>

      <div class="summary-card">
        <section id="summary-box"></section>
      </div>

      <div class="list-card">
        <div class="list-header">
          <h2>待辦事項</h2>
          <select id="sort-select" class="sort-select">
            <option value="created-desc">最新建立</option>
            <option value="created-asc">最早建立</option>
            <option value="dueDate-asc">最早到期</option>
            <option value="dueDate-desc">最晚到期</option>
            <option value="priority">優先級</option>
            <option value="status">狀態</option>
          </select>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
      </div>
    </main>
  </div>

  <script src="js/api.js?v=8"></script>
  <script src="js/gas.js?v=8"></script>
  <script src="js/app.js?v=8"></script>
</body>
</html>
