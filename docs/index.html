<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <h1>To-Do List</h1>

    <form id="todo-form">
      <input id="todo-input" placeholder="新增待辦事項" required />
      <input id="todo-date" type="date" />
      <select id="todo-category">
        <option value="">分類</option>
        <option value="學業類">學業類</option>
        <option value="開發類">開發類</option>
        <option value="生活類">生活類</option>
      </select>
      <select id="todo-status">
        <option value="待處理">待處理</option>
        <option value="進行中">進行中</option>
        <option value="阻塞中">阻塞中</option>
        <option value="待驗證">待驗證</option>
        <option value="完成">完成</option>
      </select>
      <select id="todo-priority">
        <option value="">優先級</option>
        <option value="緊急且重要">緊急且重要</option>
        <option value="重要不緊急">重要不緊急</option>
        <option value="緊急不重要">緊急不重要</option>
        <option value="不緊急也不重要">不緊急也不重要</option>
      </select>
      <input id="todo-estimate" type="number" min="0" step="0.5" placeholder="預估時數" />
      <input id="todo-tags" placeholder="#標籤 #情境" />
      <button type="submit">新增</button>
      <button type="button" id="fetch-quote">從 Quote API 加入</button>
      <button type="button" id="sync-load">從 Spreadsheet 載入</button>
    </form>

    <ul id="todo-list"></ul>
  </main>

  <script src="js/api.js?v=3"></script>
  <script src="js/gas.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
