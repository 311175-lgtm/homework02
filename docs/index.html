<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <h1>To-Do List</h1>

    <form id="todo-form">
      <input id="todo-input" placeholder="新增待辦事項" required />
      <button type="submit">新增</button>
      <button type="button" id="fetch-quote">從 Quote API 加入</button>
      <button type="button" id="sync-load">從 Spreadsheet 載入</button>
    </form>

    <ul id="todo-list"></ul>
  </main>

  <script src="js/api.js"></script>
  <script src="js/gas.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
